name: Gitleaks Secret Scan
 
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
 
jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so gitleaks can scan all commits, not just HEAD
 
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}