name: Build and Push Images (Docker Hub)

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./back-end
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            raycronin/packaging-professionals-capstone-backend:latest
            raycronin/packaging-professionals-capstone-backend:${{ github.sha }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front-end
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            raycronin/packaging-professionals-capstone-frontend:latest
            raycronin/packaging-professionals-capstone-frontend:${{ github.sha }}

